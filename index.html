<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aven Studio — Spotify</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:'Inter',sans-serif;background:#c8a0c0;overflow:hidden;
    }
    .blob{position:fixed;border-radius:50%;filter:blur(60px);opacity:0.55;
          animation:drift 8s ease-in-out infinite alternate;}
    .blob-1{width:420px;height:380px;background:#e8c4dc;top:-80px;left:-60px;animation-delay:0s}
    .blob-2{width:360px;height:400px;background:#c890b8;bottom:-60px;right:-80px;animation-delay:2s}
    .blob-3{width:280px;height:260px;background:#b870a8;top:30%;left:35%;animation-delay:4s}
    .blob-4{width:200px;height:220px;background:#f0d0e8;top:10%;right:15%;animation-delay:1s}
    @keyframes drift{
      0%{transform:translate(0,0) scale(1)}
      50%{transform:translate(20px,15px) scale(1.05)}
      100%{transform:translate(-10px,25px) scale(0.97)}
    }
    .card{
      position:relative;z-index:10;
      background:rgba(255,255,255,0.25);backdrop-filter:blur(24px);
      border:1.5px solid rgba(255,255,255,0.55);border-radius:28px;
      padding:48px 44px;max-width:400px;width:90%;text-align:center;
      box-shadow:0 20px 60px rgba(140,80,130,0.25);
    }
    .logo{font-size:52px;margin-bottom:6px}
    .brand{font-size:12px;font-weight:600;letter-spacing:3px;
           text-transform:uppercase;color:rgba(80,30,70,0.6);margin-bottom:28px}
    .spinner{width:44px;height:44px;border:3px solid rgba(180,120,160,0.25);
             border-top-color:rgba(120,50,110,0.8);border-radius:50%;
             animation:spin 0.85s linear infinite;margin:0 auto 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .icon{font-size:52px;margin-bottom:16px}
    h2{font-size:21px;font-weight:700;color:#4a1e48;margin-bottom:10px}
    .sub{font-size:14px;color:rgba(90,40,80,0.75);line-height:1.6;margin-bottom:8px}
    .hint{font-size:12px;color:rgba(90,40,80,0.40);margin-top:18px}
    code{background:rgba(80,40,80,0.12);padding:2px 7px;border-radius:5px;font-size:11px}
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>

  <div class="card">
    <div class="logo">🎵</div>
    <div class="brand">Aven Studio</div>
    <div id="spinner" class="spinner"></div>
    <div id="icon" style="display:none"></div>
    <h2 id="title">جارٍ الاتصال...</h2>
    <p id="sub" class="sub"></p>
    <p id="hint" class="hint"></p>
  </div>

  <script>
    // ══════════════════════════════════════════════════════════════
    // SMART MULTI-BOT RELAY
    // ──────────────────────────────────────────────────────────────
    // This page works for ALL bots automatically.
    // Each bot embeds its port inside the "state" parameter.
    // No need to edit this file for each bot.
    //
    // How it works:
    //   state = "PORT_XXXX_RANDOMHEX"
    //   Page reads PORT from state, redirects to correct bot server.
    // ══════════════════════════════════════════════════════════════

    const BOT_IP = '161.97.111.247'; // غيّر هذا فقط لو غيّرت السيرفر

    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    const state  = params.get('state');
    const error  = params.get('error');

    const spinner = document.getElementById('spinner');
    const icon    = document.getElementById('icon');
    const title   = document.getElementById('title');
    const sub     = document.getElementById('sub');
    const hint    = document.getElementById('hint');

    function showErr(msg) {
      spinner.style.display = 'none';
      icon.style.display = 'block'; icon.textContent = '❌';
      title.textContent = 'فشل الربط';
      title.style.color = '#8a2040';
      sub.textContent   = msg;
      hint.textContent  = 'أغلق التبويب وشغّل spotify link من جديد في Discord';
    }

    if (error) {
      showErr('رفضت الوصول إلى Spotify.');
    } else if (!code || !state) {
      showErr('بيانات مفقودة من Spotify.');
    } else {
      // ── Extract port from state ──────────────────────────────
      // state format: "PORT_20000_abc123xyz"
      let port = null;
      const portMatch = state.match(/^PORT_(\d+)_/);
      if (portMatch) {
        port = portMatch[1];
      }

      if (!port) {
        showErr('تعذّر تحديد البورت من الـ state. تأكد من إعداد البوت.');
      } else {
        sub.textContent = 'جارٍ التوجيه للبوت (بورت ' + port + ')...';
        setTimeout(() => {
          window.location.href =
            'http://' + BOT_IP + ':' + port +
            '/spotify/callback' +
            '?code='  + encodeURIComponent(code) +
            '&state=' + encodeURIComponent(state);
        }, 600);
      }
    }
  </script>
</body>
</html>
