<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aven Studio — Spotify Auth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d; color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column; gap: 16px; padding: 20px;
    }
    h1 { color: #1DB954; font-size: 24px; font-weight: 700; }
    p  { color: #aaa; font-size: 15px; text-align: center; max-width: 400px; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #222; border-top-color: #1DB954;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .big { font-size: 54px; }
    .green { color: #1DB954; }
    .red   { color: #ff4444; }
    small  { color: #444; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <div style="font-size:48px">🎵</div>
  <h1>Aven Studio</h1>
  <div id="spinner" class="spinner"></div>
  <div id="icon" style="display:none"></div>
  <p id="msg">Redirecting to bot...</p>
  <p id="sub"></p>
  <small id="info"></small>

  <script>
    // ══════════════════════════════════════════════════════
    // HOW THIS WORKS:
    // 1. Spotify redirects here with ?code=X&state=Y
    // 2. This page redirects the browser to the bot's HTTP
    //    server directly (window.location = http://...)
    // 3. The bot's HTTP server shows a success/error page
    // 4. No fetch() needed → no CORS / mixed content issues
    //
    // BOT_CALLBACK = your bot server IP:port
    // ══════════════════════════════════════════════════════
    const BOT_CALLBACK = 'http://161.97.111.247:25578';

    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    const state  = params.get('state');
    const error  = params.get('error');

    const icon = document.getElementById('icon');
    const msg  = document.getElementById('msg');
    const sub  = document.getElementById('sub');
    const info = document.getElementById('info');
    const spin = document.getElementById('spinner');

    function showErr(text) {
      spin.style.display = 'none';
      icon.style.display = 'block';
      icon.innerHTML = '<span class="big red">❌</span>';
      msg.textContent = 'Link failed';
      sub.textContent = text;
      info.textContent = 'Close this tab and try again in Discord.';
    }

    if (error) {
      showErr('You denied access to Spotify.');
    } else if (!code || !state) {
      showErr('Missing parameters from Spotify.');
    } else {
      // ── Redirect browser directly to bot HTTP server ──
      // Browser navigates there — no fetch, no CORS, no mixed-content block
      const target = BOT_CALLBACK + '/spotify/callback'
        + '?code='  + encodeURIComponent(code)
        + '&state=' + encodeURIComponent(state);

      msg.textContent = 'Connecting to bot...';
      info.textContent = 'You will be redirected automatically.';

      // Small delay so user sees "Connecting..." before redirect
      setTimeout(() => {
        window.location.href = target;
      }, 600);
    }
  </script>
</body>
</html>
